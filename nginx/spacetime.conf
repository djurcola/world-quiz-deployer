server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name spacetime.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    # SpacetimeDB keeps WebSocket connections open indefinitely
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        # Adjust this to point at your SpacetimeDB host
        # If SpacetimeDB runs on the same machine as this nginx container:
        set $upstream_app 127.0.0.1;
        set $upstream_port 3080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # REQUIRED for WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
